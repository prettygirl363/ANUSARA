<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Anusara Store</title>

<style>

:root {
  --title-size: 30px;
  --big-size: 24px;
  --small-size: 18px;
  --button-size: 18px;
  --main-color: #d80a5f; /* 💖 สีหลัก */
}

body {
  margin: 0;
  font-family: Arial;
  background: #fff8f0;
  color: var(--main-color); /* ใช้ทั้งเว็บ */
  text-align: center;
}

.container {
  padding: 30px;
}

/* 🖼️ รูป */
img {
  width: 120px;
  border-radius: 50%;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
  transition: transform 0.25s ease;
}

img:hover {
  animation: kawaiiBounce 0.8s ease;
  box-shadow: 0 0 20px rgba(216,10,95,0.4);
}

@keyframes kawaiiBounce {
  0%   { transform: scale(1); }
  25%  { transform: scale(1.08); }
  50%  { transform: scale(0.97); }
  75%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}

/* 💖 หัวข้อ */
h1 {
  font-size: var(--title-size);
  color: #ff8fa3;
}

/* ข้อความ */
.big-text {
  font-size: var(--big-size);
  font-weight: bold;
}

.small-text {
  font-size: var(--small-size);
}

/* 💎 ปุ่ม glass */
.link {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 80%;
  max-width: 300px;

  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border-radius: 12px;
  border: 1px solid rgba(216,10,95,0.4);

  color: var(--main-color);
  text-decoration: none;
  font-size: var(--button-size);

  transition: 0.3s;
}

/* ✨ hover ปุ่ม */
.link:hover {
  transform: scale(1.05);
  background: rgba(255, 255, 255, 0.6);
  box-shadow: 0 8px 25px rgba(216,10,95,0.3);
}

/* 🎵 ปุ่มเพลง */
.music-btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: rgba(216,10,95,0.1);
  border: 1px solid rgba(216,10,95,0.4);
  border-radius: 12px;
  color: var(--main-color);
  cursor: pointer;
  font-size: 16px;
}

/* ✨ sparkle */
.sparkle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: var(--main-color);
  border-radius: 50%;
  opacity: 0.7;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh) scale(0.5);
    opacity: 0;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.2);
    opacity: 0;
  }
}

</style>
</head>

<body>

<div class="container">

<img src="https://raw.githubusercontent.com/prettygirl363/ANUSARA/main/มีพื้นหลัง.png">

<h1>✧˖° ꒰🍓🍵 Anusara Store 🧚🏻‍♀️🐿️ ˚˖✧</h1>

<p class="big-text">ミ รับทำ ป้ายคิ้วท์ๆ กึ่ง Ads สไตล์น่ารัก ✨</p>
<p class="small-text">♡ เริ่มต้นเพียง 89 บาท</p>

<a class="link" href="#">เช็คคิว</a>
<a class="link" href="#">รายละเอียดการสั่งงาน</a>
<a class="link" href="#">ตัวอย่างงาน</a>
<a class="link" href="#">เลือกตูน</a>

<button class="music-btn" onclick="playMusic()">🎵 เล่นเพลง</button>
<audio id="bgMusic" loop>
  <source src="https://raw.githubusercontent.com/prettygirl363/ANUSARA/main/v09044g40000cl6q7pvog65g8sdrhv60.mp3" type="audio/mpeg">
</audio>

</div>

<script>
function playMusic() {
  var music = document.getElementById("bgMusic");
  music.play();
}

for (let i = 0; i < 30; i++) {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(s);
}
</script>

</body>
</html>
