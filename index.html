<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Anusara Store</title>

<style>

:root {
  --title-size: 30px;
  --big-size: 24px;
  --small-size: 18px;
  --button-size: 18px;

  --color-title: #d80a5f;
  --color-big: #FFD1D5;
  --color-small: #8b5e3c;
  --color-button: #FFD1D5;
  --color-music: #d80a5f;
}

body {
  margin: 0;
  font-family: Arial;
  background: #fff8f0;
  color: #333;
  text-align: center;
}

.container {
  padding: 30px;
}

/* 🖼️ รูป */
img {
  width: 120px;
  border-radius: 50%;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
  transition: transform 0.25s ease;
}

/* 🌸 hover รูป */
img:hover {
  transform: scale(1.05);
}

/* 💖 หัวข้อ */
h1 {
  font-size: var(--title-size);
  color: var(--color-title);
}

/* 🔥 ข้อความ */
.big-text {
  font-size: var(--big-size);
  font-weight: bold;
  color: var(--color-big);
}

.small-text {
  font-size: var(--small-size);
  color: var(--color-small);
}

/* 💎 ปุ่ม */
.link {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 80%;
  max-width: 300px;

  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);

  border-radius: 12px;
  border: 1px solid rgba(216,10,95,0.4);

  color: var(--color-button);
  text-decoration: none;
  font-size: var(--button-size);

  transition: 0.3s;
}

.link:hover {
  transform: scale(1.05);
}

/* 💥 เด้งตอนกด */
.link:active,
.music-btn:active {
  animation: pressBounce 0.25s ease;
}

@keyframes pressBounce {
  0%   { transform: scale(1); }
  50%  { transform: scale(0.9); }
  100% { transform: scale(1.05); }
}

/* 🎵 ปุ่มเพลง */
.music-btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: rgba(216,10,95,0.1);
  border-radius: 12px;
  border: 1px solid rgba(216,10,95,0.4);
  color: var(--color-music);
  cursor: pointer;
}

/* ✨ sparkle */
.sparkle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: #d80a5f;
  border-radius: 50%;
  opacity: 0.7;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh) scale(0.5);
    opacity: 0;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.2);
    opacity: 0;
  }
}

</style>
</head>

<body>

<div class="container">

<img src="https://raw.githubusercontent.com/prettygirl363/ANUSARA/main/มีพื้นหลัง.png">

<h1>✧˖° ꒰🍓🍵 Anusara Store 🧚🏻‍♀️🐿️ ˚˖✧</h1>

<p class="big-text">ミ รับทำ ป้ายคิ้วท์ๆ กึ่ง Ads สไตล์น่ารัก ✨</p>
<p class="small-text">♡ เริ่มต้นเพียง 89 บาท</p>

<a class="link" href="#" onclick="playClick()">เช็คคิว</a>
<a class="link" href="#" onclick="playClick()">รายละเอียดการสั่งงาน</a>
<a class="link" href="#" onclick="playClick()">ตัวอย่างงาน</a>
<a class="link" href="#" onclick="playClick()">เลือกตูน</a>

<button class="music-btn" onclick="playClick(); playMusic()">🎵 เล่นเพลง</button>

<!-- 🎵 เพลง -->
<audio id="bgMusic" loop>
  <source src="https://raw.githubusercontent.com/prettygirl363/ANUSARA/main/v09044g40000cl6q7pvog65g8sdrhv60.mp3" type="audio/mpeg">
</audio>

<!-- 🔊 เสียงคลิก -->
<audio id="clickSound">
  <source src="https://raw.githubusercontent.com/prettygirl363/ANUSARA/main/click.mp3" type="audio/mpeg">
</audio>

</div>

<script>

/* 🎵 เพลง */
function playMusic() {
  var music = document.getElementById("bgMusic");
  music.play();
}

/* 🔊 เสียงคลิก */
function playClick() {
  var click = document.getElementById("clickSound");
  click.currentTime = 0;
  click.play();
}

/* ✨ sparkle */
for (let i = 0; i < 30; i++) {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(s);
}

</script>

</body>
</html>
